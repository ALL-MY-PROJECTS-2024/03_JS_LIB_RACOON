    <script>
        document.addEventListener("DOMContentLoaded",function(){
            
            const game = new Game();
            window.game = game;
           
        })
    </script>
 

 <select name="" id="changeAction" onchange="javascript:game.changeAction()" style="position:fixed;left:5vw;top:5vh;z-index:999">
